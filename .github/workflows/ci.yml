name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff>=0.4 black>=24.3
      - name: Ruff
        run: ruff check src tests
      - name: Black
        run: black --check src tests

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package + dev + ml + api extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,ml,api]"

      - name: Pytest (unit + integration)
        run: pytest -q --no-cov --maxfail=3 --durations=10

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      # The real model artifacts (joblib + threshold json) are gitignored.
      # Create stubs so the Dockerfile's COPY models step succeeds.
      # The built image is build-validated only; container runtime will report
      # model_loaded=false, which the API tolerates (returns 503 on /predict).
      - name: Create stub models dir for build validation
        run: |
          mkdir -p models/tuned
          touch models/tuned/xgboost.joblib
          touch models/winner_calibrator.joblib
          cat > models/winner_threshold.json <<'JSON'
          {"winner_model":"xgboost","calibrator":"uncalibrated","threshold":0.032,"cost_fn":15000,"cost_fp":500,"test_total_cost_usd":0,"test_cost_per_encounter_usd":0,"test_cost_always_treat_usd":0,"test_cost_never_treat_usd":0,"confusion":{"tn":0,"fp":0,"fn":0,"tp":0},"test_n":1,"test_n_pos":1,"seed":42}
          JSON

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build API image (no push, validates Dockerfile + requirements-api.txt)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: readmit-bench-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

